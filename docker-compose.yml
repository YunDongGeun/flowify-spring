services:
  spring-boot:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - flowify-net

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - flowify-net

networks:
  flowify-net:
    driver: bridge

volumes:
  mongo_data:
